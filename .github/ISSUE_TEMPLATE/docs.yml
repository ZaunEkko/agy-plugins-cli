name: 📚 Documentation Update
description: Report missing or incorrect documentation, or suggest improvements to the CLI README
labels: ["documentation"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the documentation!
        感谢您协助改进文档！

  - type: dropdown
    id: lang
    attributes:
      label: Which language document needs updating? (哪个语言版本的文档需要更新？)
      options:
        - English (README.md)
        - 简体中文 (i18n/zh-CN)
        - 繁體中文 (i18n/zh-TW)
        - 日本語 (i18n/ja)
        - 한국어 (i18n/ko)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description of the issue (问题描述)
      description: Describe what is wrong or missing in the current CLI documentation.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Fix (建议的修改)
      description: If you have a specific text change in mind, please provide it here.
