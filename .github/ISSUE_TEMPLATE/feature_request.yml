name: 💡 Feature Request
description: Suggest a new feature or enhancement for the CLI package manager
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please provide as much detail as possible.
        感谢您提出功能建议！请尽可能提供详细信息。
        
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem? (是否与某个痛点相关？)
      description: A clear and concise description of what the problem is.
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like (您期望的解决方案)
      description: A clear and concise description of what you want to happen (e.g., new CLI commands, flags, or TUI improvements).
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered (您考虑过的替代方案)
      description: A clear and concise description of any alternative solutions or workarounds you've considered.

  - type: textarea
    id: context
    attributes:
      label: Additional Context (补充信息)
      description: Add any other context or screenshots about the feature request here.
