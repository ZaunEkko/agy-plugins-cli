name: 🐛 Bug Report
description: Report a bug or issue with the agy-plugins-cli tool
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please provide as much information as possible to help us reproduce and fix it.
        感谢您报告 Bug！请尽可能提供详细信息以帮助我们重现并修复它。
        
  - type: textarea
    id: description
    attributes:
      label: Description (描述)
      description: A clear and concise description of what the bug is.
      placeholder: When I run `agy-plugin install...` it crashes with...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce (重现步骤)
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run command '...'
        2. Select '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior (预期行为)
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: input
    id: cli-version
    attributes:
      label: CLI Version (CLI 版本)
      description: Output of `agy-plugin --version`
      placeholder: v1.x.x
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version (Node.js 版本)
      description: Output of `node -v`
      placeholder: v20.x.x
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System (操作系统)
      description: What OS are you using? (e.g. Windows 11, macOS Sonoma, Ubuntu 22.04)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs or Screenshots (错误日志或截图)
      description: Paste any relevant terminal output, stack traces, or screenshots here.
